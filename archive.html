<body>

<div class="float-links">

  </button>
</div>

<div class="archive-list">

  <div class="archive-cat">

    </div>

    </div>
  </div>

  <div class="archive-cat">
    <div class="archive-cat-head">
      <a href="band.html">關於日常</a>
      <span class="label">About Life</span>
    </div>
    <div class="archive-articles" id="cat-about-daily">
      <div class="archive-skeleton"><div class="sk-line w70"></div></div>
    </div>
  </div>

    </div>
  </div>

</div>

<script>
  function toggleTextSize(){
    var on = document.body.classList.toggle('text-large');
    localStorage.setItem('enchiang-text-large', on ? '1' : '0');
    var btn = document.querySelector('.float-textsize');
    if(btn) btn.classList.toggle('active', on);
  }
  if(localStorage.getItem('enchiang-text-large') === '1'){
    document.body.classList.add('text-large');
  }
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.querySelector('.float-textsize');
    if(btn && localStorage.getItem('enchiang-text-large') === '1') btn.classList.add('active');
  });

  function renderAllCategories(html){
    var doc = new DOMParser().parseFromString(html, 'text/html');
    ['about-en','about-daily','journal'].forEach(function(groupName){
      var group = doc.querySelector('.menu-group[data-group="' + groupName + '"] .menu-sublist');
      var list = document.getElementById('cat-' + groupName);
      var links = group ? Array.from(group.querySelectorAll('a[href]')) : [];
      if(!links.length){
        list.innerHTML = '<div class="archive-empty">目前這個分類還沒有文章。</div>';
        return;
      }
      list.innerHTML = links.map(function(a){
        var href = a.getAttribute('href') || '#';
        if(href.charAt(0) === '#') href = 'index.html' + href;
        var title = a.textContent.trim();
        return '<a href="' + href + '" target="_blank" rel="noopener">' + title + '<span class="arrow">→</span></a>';
      }).join('');
    });
  }

  var cachedAll = sessionStorage.getItem('enchiang-index-cache');
  if(cachedAll){
    renderAllCategories(cachedAll);
  } else {
    fetch('index.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        sessionStorage.setItem('enchiang-index-cache', html);
        renderAllCategories(html);
      })
      .catch(function(){
        ['cat-about-en','cat-about-daily','cat-journal'].forEach(function(id){
          var el = document.getElementById(id);
          if(el) el.innerHTML = '<div class="archive-empty">文章清單載入失敗，請確認網路連線後重新整理。</div>';
        });
      });
  }
</script>
