name: Notion 自動同步發佈

on:
  schedule:
    # 每 20 分鐘檢查一次 Notion（GitHub 的排程時間為 UTC）
    - cron: '*/20 * * * *'
  workflow_dispatch: {}   # 也可以在 GitHub 網頁上手動點「Run workflow」立即同步

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 從 Notion 同步文章到 index.html
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ARTICLES_DB_ID: ${{ secrets.ARTICLES_DB_ID }}
        run: node scripts/sync-notion.js

      - name: 如果有變更就自動 commit 並推送
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- index.html; then
            echo "沒有變更，跳過 commit"
          else
            git add index.html
            git commit -m "chore: 從 Notion 自動同步文章內容"
            git push
          fi
